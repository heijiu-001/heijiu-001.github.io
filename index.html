<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
  :root {
    --bg-deep: #0a0a0f;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.10);
    --text-primary: #e8e8f0;
    --text-secondary: #a0a0b8;
    --accent-1: #ff6ec7;
    --accent-2: #7b5cff;
    --accent-3: #3cc7f2;
    --glow-1: rgba(255,110,199,0.35);
    --glow-2: rgba(123,92,255,0.35);
    --glow-3: rgba(60,199,242,0.25);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:16px; scroll-behavior:smooth; }
  body {
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg-deep);
    font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--text-primary);
    overflow-x:hidden;
    position:relative;
  }
  .bg-orbs {
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  }
  .bg-orb {
    position:absolute; border-radius:50%; filter:blur(120px); opacity:0.45;
    animation:orbFloat var(--dur) ease-in-out infinite;
    animation-delay:var(--delay);
  }
  .bg-orb:nth-child(1) {
    width:500px; height:500px; background:var(--accent-1);
    top:-15%; left:-10%; --dur:18s; --delay:0s;
  }
  .bg-orb:nth-child(2) {
    width:400px; height:400px; background:var(--accent-2);
    bottom:-20%; right:-8%; --dur:22s; --delay:-7s;
  }
  .bg-orb:nth-child(3) {
    width:350px; height:350px; background:var(--accent-3);
    top:40%; left:60%; --dur:20s; --delay:-12s;
  }
  @keyframes orbFloat {
    0%, 100% { transform:translate(0,0) scale(1); }
    25%      { transform:translate(8vw,-6vh) scale(1.15); }
    50%      { transform:translate(-4vw,10vh) scale(0.9); }
    75%      { transform:translate(-10vw,-4vh) scale(1.1); }
  }
  #starCanvas {
    position:fixed; inset:0; z-index:1; pointer-events:none;
  }
  .main-container {
    position:relative; z-index:2;
    width:min(520px, 92vw);
    animation:cardEntry 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardEntry {
    from { opacity:0; transform:translateY(40px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .card {
    position:relative;
    background:var(--card-bg);
    backdrop-filter:blur(40px) saturate(140%);
    -webkit-backdrop-filter:blur(40px) saturate(140%);
    border:1px solid var(--card-border);
    border-radius:28px;
    padding:clamp(32px,6vw,48px);
    text-align:center;
    overflow:hidden;
    transition:transform 0.15s ease-out, box-shadow 0.15s ease-out;
    box-shadow:0 20px 60px rgba(0,0,0,0.5),
               inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .card::before {
    content:""; position:absolute; inset:-2px; border-radius:30px; z-index:-1;
    background:conic-gradient(from var(--border-angle,0deg),
      transparent, var(--accent-1), var(--accent-2), var(--accent-3), transparent);
    opacity:0.5; animation:borderSpin 5s linear infinite;
  }
  @keyframes borderSpin {
    to { --border-angle:360deg; }
  }
  @property --border-angle {
    syntax:"<angle>"; inherits:false; initial-value:0deg;
  }
  .avatar-wrap {
    position:relative; display:inline-block; margin-bottom:20px;
  }
  .avatar {
    width:110px; height:110px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:3rem; color:#fff;
    position:relative; z-index:1;
    box-shadow:0 0 40px var(--glow-1), 0 0 80px rgba(123,92,255,0.2);
    transition:box-shadow 0.5s;
  }
  .avatar-ring {
    position:absolute; inset:-6px; border-radius:50%;
    border:2px solid transparent;
    border-top-color:var(--accent-1);
    border-right-color:var(--accent-2);
    animation:ringSpin 3s linear infinite;
  }
  @keyframes ringSpin { to { transform:rotate(360deg); } }
  .name {
    font-size:clamp(1.6rem, 4vw, 2.2rem);
    font-weight:700; letter-spacing:0.02em;
    background:linear-gradient(135deg, #fff 20%, var(--accent-1) 50%, var(--accent-3) 80%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:6px;
  }
  .tagline {
    color:var(--text-secondary); font-size:0.95rem;
    letter-spacing:0.04em;
    margin-bottom:28px;
  }
  .divider {
    width:60px; height:2px; margin:0 auto 24px;
    border-radius:1px;
    background:linear-gradient(90deg, transparent, var(--accent-2), var(--accent-1), transparent);
  }
  .section-label {
    font-size:0.75rem; text-transform:uppercase; letter-spacing:0.12em;
    color:var(--text-secondary); margin-bottom:14px;
  }
  .skills {
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    margin-bottom:28px;
  }
  .skill-tag {
    position:relative;
    padding:7px 18px; border-radius:20px;
    font-size:0.85rem; font-weight:500;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.10);
    color:var(--text-secondary);
    cursor:default; overflow:hidden;
    transition:color 0.3s, border-color 0.3s, transform 0.25s;
  }
  .skill-tag::after {
    content:""; position:absolute; inset:0;
    background:linear-gradient(110deg,
      transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
    transform:translateX(-100%);
    transition:transform 0.5s;
  }
  .skill-tag:hover {
    color:#fff; border-color:var(--accent-1);
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 6px 24px var(--glow-1);
  }
  .skill-tag:hover::after {
    transform:translateX(100%);
  }
  .socials {
    display:flex; gap:18px; justify-content:center; align-items:center;
    margin-bottom:8px;
  }
  .social-link {
    display:flex; align-items:center; justify-content:center;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.10);
    text-decoration:none; color:var(--text-secondary);
    font-size:1.25rem;
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position:relative;
  }
  .social-link:hover {
    color:#fff;
    transform:translateY(-6px) scale(1.15);
    border-color:var(--accent-2);
    box-shadow:0 12px 32px var(--glow-2);
  }
  .social-link:nth-child(2):hover { border-color:var(--accent-1); box-shadow:0 12px 32px var(--glow-1); }
  .social-link:nth-child(3):hover { border-color:var(--accent-3); box-shadow:0 12px 32px var(--glow-3); }
  .footer {
    text-align:center; margin-top:20px;
    font-size:0.75rem; color:rgba(255,255,255,0.2);
    letter-spacing:0.06em;
  }
  @media (max-width:480px) {
    .card { padding:28px 20px; border-radius:22px; }
    .card::before { border-radius:24px; }
    .avatar { width:90px; height:90px; font-size:2.4rem; }
    .skills { gap:7px; }
    .skill-tag { padding:6px 14px; font-size:0.8rem; }
    .socials { gap:14px; }
    .social-link { width:40px; height:40px; font-size:1.1rem; }
  }
</style>
</head>
<body>

<script>
(function() {
  var canvas = document.getElementById("starCanvas");
  var ctx = canvas.getContext("2d");
  var stars = [];
  var STAR_COUNT = 100;
  var animId;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", function() { resize(); initStars(); });
  resize();

  function initStars() {
    stars = [];
    for (var i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.3,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15
      });
    }
  }
  initStars();

  function draw(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(timestamp * s.twinkleSpeed + s.twinkleOffset));
      ctx.fillStyle = "rgba(255,255,255," + alpha.toFixed(2) + ")";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      s.x += s.vx;
      s.y += s.vy;
      if (s.x < -5) s.x = canvas.width + 5;
      if (s.x > canvas.width + 5) s.x = -5;
      if (s.y < -5) s.y = canvas.height + 5;
      if (s.y > canvas.height + 5) s.y = -5;
    }
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 0.5;
    for (var i = 0; i < stars.length; i++) {
      for (var j = i + 1; j < stars.length; j++) {
        var dx = stars[i].x - stars[j].x;
        var dy = stars[i].y - stars[j].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 110) {
          ctx.beginPath();
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[j].x, stars[j].y);
          ctx.stroke();
        }
      }
    }
    animId = requestAnimationFrame(draw);
  }
  animId = requestAnimationFrame(draw);

  var card = document.getElementById("card");
  var cardBounds = card.getBoundingClientRect();
  function updateBounds() {
    cardBounds = card.getBoundingClientRect();
  }
  window.addEventListener("resize", updateBounds);
  window.addEventListener("scroll", updateBounds);
  document.addEventListener("mousemove", function(e) {
    var cx = cardBounds.left + cardBounds.width / 2;
    var cy = cardBounds.top + cardBounds.height / 2;
    var dx = (e.clientX - cx) / cardBounds.width;
    var dy = (e.clientY - cy) / cardBounds.height;
    var tiltX = dy * -6;
    var tiltY = dx * 6;
    card.style.transform = "perspective(800px) rotateX(" + tiltX.toFixed(1) + "deg) rotateY(" + tiltY.toFixed(1) + "deg)";
  });
  document.addEventListener("mouseleave", function() {
    card.style.transform = "perspective(800px) rotateX(0) rotateY(0)";
  });
})();
</script>
